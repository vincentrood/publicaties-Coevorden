<!DOCTYPE html>
<html>
<head>
    <title>{{ .Title }}</title>
    {{ $pdf_url := print "https://publicaties-coevorden.s3.eu-north-1.amazonaws.com/pdf+bestanden/" .File.BaseFileName ".pdf" }}
</head>
<body>

    <script>
        window.location.href = "{{ $pdf_url | safeJS }}";
    </script>

    <div data-pagefind-ignore="all" style="font-family: sans-serif; text-align: center; padding: 50px;">
        <h1>{{ .Title }}</h1>
        <p>U wordt doorgestuurd naar de PDF...</p>
        <p><a href="{{ $pdf_url }}">Klik hier als er niets gebeurt.</a></p>
    </div>

    <div style="visibility: hidden; height: 0; overflow: hidden;">
        <article data-pagefind-body>
            <h1 data-pagefind-meta="title">{{ .Title }}</h1>
            <p>{{ .Content }}</p>
            <a href="{{ $pdf_url }}" data-pagefind-meta="url[href]">Bekijk PDF</a>
        </article>
    </div>

</body>
</html>
