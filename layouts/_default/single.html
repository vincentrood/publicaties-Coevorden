<!DOCTYPE html>
<html>
<head>
    <title>{{ .Title }}</title>
</head>
<body>
    <div data-pagefind-ignore="all">
        <h1>Bezig met doorsturen naar PDF...</h1>
        {{ $pdf_url := print "https://publicaties-coevorden.s3.eu-north-1.amazonaws.com/pdf+bestanden/" .File.BaseFileName ".pdf" }}
        
        <script>
            window.location.href = "{{ $pdf_url | safeJS }}";
        </script>

        <p>Als je niet wordt doorgestuurd, <a href="{{ $pdf_url }}">klik dan hier</a>.</p>
    </div>
    
    <div style="display:none;">
        <article data-pagefind-body>
            <h1 data-pagefind-meta="title">{{ .Title }}</h1>
            
            <div class="content">
                {{ .Content }}
            </div>

            <a href="https://publicaties-coevorden.s3.eu-north-1.amazonaws.com/pdf+bestanden/{{ .File.BaseFileName }}.pdf" data-pagefind-meta="url[href]">PDF</a>
        </article>
    </div>
</body>
</html>
