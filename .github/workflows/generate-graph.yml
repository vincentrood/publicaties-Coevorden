name: Metagegevens toevoegen op basis van AI

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install gray-matter openai glob fs-extra p-limit

      - name: Run enrichment script
        run: node scripts/enrich.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"
          git add docs/**/*.md
          git commit -m "chore: enrich markdown with AI metadata" || exit 0
          git push
