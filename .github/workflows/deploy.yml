name: Robust S3 → Hugo Markdown Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🔧 GLOBALE VARIABELEN (hier stel je alles in)
env:
  BUCKET_NAME: publicaties-coevorden
  S3_PREFIX: publicaties/          # 👈 alleen deze map uit S3 syncen (leeg = alles)
  HUGO_CONTENT_DIR: docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils jq

      - name: Sync S3 → Markdown (taxonomy enabled)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          set -euo pipefail
          mkdir -p "$HUGO_CONTENT_DIR"

          echo "📥 S3 listing (prefix: $S3_PREFIX)"

          > s3_list.txt
          TOKEN=""

          while : ; do
            if [ -z "$TOKEN" ]; then
              RESPONSE=$(aws s3api list-objects-v2 \
                --bucket "$BUCKET_NAME" \
                --prefix "$S3_PREFIX" \
                --max-items 1000)
            else
              RESPONSE=$(aws s3api list-objects-v2 \
                --bucket "$BUCKET_NAME" \
                --prefix "$S3_PREFIX" \
                --starting-token "$TOKEN" \
                --max-items 1000)
            fi

            echo "$RESPONSE" | jq -r '.Contents[].Key' | grep '\.pdf$' >> s3_list.txt || true
            TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')
            [ -z "$TOKEN" ] && break
          done

          sort -u s3_list.txt -o s3_list.txt

          echo "📊 PDF count: $(wc -l < s3_list.txt)"

          echo "🧹 Cleanup removed files..."
          find "$HUGO_CONTENT_DIR" -name "*.md" -print0 | while IFS= read -r -d '' md_path; do
            relative="${md_path#$HUGO_CONTENT_DIR/}"
            expected_pdf="${S3_PREFIX}${relative%.md}.pdf"

            if ! grep -Fxq "$expected_pdf" s3_list.txt; then
              echo "❌ Removing: $md_path"
              rm "$md_path"
            fi
          done

          echo "➕ Processing PDFs..."

          process_file () {
            pdf_key="$1"

            # verwijder prefix zodat structuur schoon blijft
            relative="${pdf_key#$S3_PREFIX/}"
            md_path="${HUGO_CONTENT_DIR}/${relative%.pdf}.md"

            if [ -f "$md_path" ]; then
              return
            fi

            echo "🆕 $pdf_key"

            mkdir -p "$(dirname "$md_path")"
            tmpfile=$(mktemp --suffix=.pdf)

            if aws s3 cp "s3://$BUCKET_NAME/$pdf_key" "$tmpfile" --quiet; then

              filename=$(basename "${pdf_key%.pdf}")
              clean_title=$(echo "$filename" | tr '"' "'")

              # taxonomy uit mapstructuur
              IFS='/' read -ra parts <<< "${relative}"

              taxo=()
              for ((i=0; i<${#parts[@]}-1; i++)); do
                taxo+=("\"${parts[$i]}\"")
              done

              taxonomy_list=$(IFS=,; echo "${taxo[*]}")

              {
                printf -- "---\n"
                printf "title: \"%s\"\n" "$clean_title"
                printf "maps: [%s]\n" "$taxonomy_list"
                printf "source: \"%s\"\n" "$pdf_key"
                printf "date: %s\n" "$(date +%Y-%m-%d)"
                printf -- "---\n\n"
              } > "$md_path"

              pdftotext -raw "$tmpfile" - | tr -d '\000' >> "$md_path"
            fi

            rm -f "$tmpfile"
          }

          export -f process_file
          export BUCKET_NAME S3_PREFIX HUGO_CONTENT_DIR

          cat s3_list.txt | xargs -I {} -P 4 bash -c 'process_file "$@"' _ {}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync: S3 → Hugo Markdown (prefix + structured build)"
          file_pattern: 'docs/**'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2

      - name: Build Hugo site
        run: |
          mkdir -p content
          cp -r "$HUGO_CONTENT_DIR" content/docs 2>/dev/null || true
          hugo --minify

      - name: Index with Pagefind
        run: npx pagefind --site public --bundle-dir _pagefind

      - name: Deploy to S3 (NON-root deploy)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_SITE }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_SITE }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          aws s3 sync ./public "s3://$BUCKET_NAME/S3_PREFIX" \
            --delete
